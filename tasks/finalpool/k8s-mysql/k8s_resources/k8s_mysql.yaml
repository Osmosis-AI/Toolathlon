# =========================
# Cluster 242: Namespaces
# =========================
apiVersion: v1
kind: Namespace
metadata:
  name: production
---
apiVersion: v1
kind: Namespace
metadata:
  name: dev
---
apiVersion: v1
kind: Namespace
metadata:
  name: data
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: default
  namespace: data
---

# =========================
# data: MySQL-f1 Secrets & Config
# =========================
---
apiVersion: v1
kind: Secret
metadata:
  name: mysql-f1-secret
  namespace: data
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "mcpbench0606"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-f1-config
  namespace: data
data:
  custom.cnf: |
    [mysqld]
    local_infile=1
    character-set-server=utf8mb4
    collation-server=utf8mb4_0900_ai_ci
    # Native AIO via io_setup() fails with EAGAIN when many mysqld
    # processes share the host (system-wide fs.aio-max-nr exhausted) —
    # InnoDB then aborts init.  Simulated AIO has a small perf cost but
    # is resilient to host-level AIO context exhaustion.
    innodb_use_native_aio=0

# =========================
# data: MySQL-f1 Service & StatefulSet (Persistent Storage)
# =========================
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-f1
  namespace: data
  labels:
    app: mysql-f1
spec:
  # Use Headless to fix DNS (e.g., mysql-f1-0.mysql-f1.data.svc.cluster.local)
  clusterIP: None
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  selector:
    app: mysql-f1
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql-f1
  namespace: data
spec:
  serviceName: mysql-f1
  replicas: 1
  selector:
    matchLabels:
      app: mysql-f1
  template:
    metadata:
      labels:
        app: mysql-f1
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          # Recovery wrapper: if a previous mysqld --initialize crashed after
          # writing auto.cnf but before bootstrapping the `mysql/` system
          # schema, every subsequent restart aborts with "data directory has
          # files in it. Aborting." (CrashLoopBackOff forever).  We can't use
          # an initContainer because those only run at pod creation, not on
          # main-container restart within the same pod.  So we wrap the
          # upstream docker-entrypoint.sh: detect the poisoned state and
          # wipe the dir before delegating.  On the happy path this no-ops.
          command: ["bash", "-c"]
          args:
            - |
              set -eu
              if [ -n "$(ls -A /var/lib/mysql 2>/dev/null)" ] && [ ! -d /var/lib/mysql/mysql ]; then
                echo "[recover] poisoned mysql data dir detected; wiping /var/lib/mysql/*"
                rm -rf /var/lib/mysql/* /var/lib/mysql/.[!.]* 2>/dev/null || true
              fi
              exec /usr/local/bin/docker-entrypoint.sh mysqld --local-infile=ON
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-f1-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: "f1"
          ports:
            - name: mysql
              containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: mysql-f1-config
              mountPath: /etc/mysql/conf.d/custom.cnf
              subPath: custom.cnf
          readinessProbe:
            exec:
              command: ["bash","-lc","mysqladmin ping -uroot -p$MYSQL_ROOT_PASSWORD"]
            initialDelaySeconds: 20
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 4Gi
      volumes:
        - name: mysql-f1-config
          configMap:
            name: mysql-f1-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: csv-loader
  namespace: data
spec:
  restartPolicy: Never
  containers:
    - name: loader
      image: mysql:8.4
      command: ["sleep", "infinity"]
      env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mysql-f1-secret   # Consistent with MySQL StatefulSet Secret
              key: MYSQL_ROOT_PASSWORD
      volumeMounts:
        - name: csv
          mountPath: /csv
  volumes:
    - name: csv
      emptyDir: {}
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: production
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
      env: production
      release: v2.3.1
  template:
    metadata:
      labels:
        app: user-service
        env: production
        release: v2.3.1
    spec:
      containers:
        - name: user-api
          image: nginx:1.14
          ports:
            - containerPort: 9090
          env:
            - name: LOG_LEVEL
              value: "info"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-manager-dev
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-manager
      env: dev
      release: dev-latest
  template:
    metadata:
      labels:
        app: inventory-manager
        env: dev
        release: dev-latest
    spec:
      containers:
        - name: inventory-api
          image: nginx:1.14
          ports:
            - containerPort: 6060
          env:
            - name: LOG_LEVEL
              value: "debug"
